replicaCount: 2

image:
  repository: rootdavinalfa/catatkeun
  pullPolicy: Always
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

namespace: catatkeun
clusterDomain: cluster.local

config:
  NODE_ENV: production
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  NEXT_TELEMETRY_DISABLED: "1"
  BETTER_AUTH_URL: "http://catatkeun-svc:3000"
  NEXT_PUBLIC_BETTER_AUTH_URL: "https://catatkeun.example.com"
  NEXT_PUBLIC_API_URL: "https://catatkeun.example.com/api"

secrets:
  BETTER_AUTH_SECRET: ""         # Required: generate with openssl rand -base64 32
  GOOGLE_CLIENT_ID: ""           # Required: Google OAuth client ID
  GOOGLE_CLIENT_SECRET: ""        # Required: Google OAuth client secret
  # MongoDB Atlas example:
  # mongodb+srv://user:pass@cluster0.fioyv.mongodb.net/catatkeun?retryWrites=true&w=majority
  DATABASE_URL: ""               # Required: MongoDB connection string
  RECURRING_JOB_SECRET: ""       # Required: secret for recurring job scheduler

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /api/health
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  path: /api/health
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  path: /api/health
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 30

recurringJobs:
  mode: sidecar         # sidecar or cronjob
  schedule: "0 0 * * *"
  timeZone: "Asia/Jakarta"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  sidecarResources:
    requests:
      cpu: 10m
      memory: 8Mi
    limits:
      cpu: 50m
      memory: 32Mi

networkPolicy:
  enabled: true
  # k3s default Traefik runs in kube-system.
  # Change this if your ingress controller lives in a different namespace.
  ingressFromNamespace: kube-system
  # MongoDB Atlas uses port 27017 (external, egress allowed to anywhere on this port).
  mongodbPort: 27017

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: false
  className: "traefik"
  # k3s Traefik example annotations:
  # annotations:
  #   cert-manager.io/cluster-issuer: "letsencrypt-prod"
  #   traefik.ingress.kubernetes.io/router.middlewares: "default-redirect-https@kubernetescrd"
  annotations: {}
  hosts: []
  tls: []
